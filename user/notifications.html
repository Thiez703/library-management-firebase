<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibSpace - Thông báo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">
    <nav id="site-navbar" class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="text-xl font-bold text-slate-800">Lib<span class="text-primary-600">Space</span></a>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-slate-500 hover:text-slate-900 font-medium">Trang chủ</a>
                    <a href="catalog.html" class="text-slate-500 hover:text-slate-900 font-medium">Kho học liệu</a>
                    <a href="borrow-history.html" class="text-slate-500 hover:text-slate-900 font-medium">Mượn/Trả</a>
                    <a href="notifications.html" class="text-primary-600 font-medium border-b-2 border-primary-600 relative">
                        Thông báo
                        <span id="notificationBadge" class="hidden absolute -top-1 -right-3 w-4 h-4 bg-rose-500 text-white text-[9px] font-bold flex items-center justify-center rounded-full">0</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <button data-favorite-trigger type="button" class="relative text-slate-500 hover:text-rose-500 p-2" title="Sách yêu thích">
                        <i class="ph ph-heart text-2xl"></i>
                        <span data-favorite-count class="absolute top-0 right-0 w-4 h-4 bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white">0</span>
                    </button>
                    <a href="cart.html" class="relative text-slate-500 hover:text-primary-600 p-2" title="Giỏ mượn">
                        <i class="ph ph-books text-2xl"></i>
                        <span data-cart-count class="absolute top-0 right-0 min-w-[16px] h-4 px-1 bg-primary-600 text-white text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white">0</span>
                    </a>
                    <div class="hidden sm:flex items-center gap-3" data-auth-slot></div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 flex-1">
        <header class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Thông báo</h1>
                <p class="text-slate-500 mt-1 text-sm">Cập nhật tình trạng phiếu mượn sách của bạn theo thời gian thực.</p>
            </div>
            <a href="borrow-history.html"
                class="hidden sm:inline-flex items-center gap-2 px-4 py-2 border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium text-sm rounded-xl transition-colors">
                <i class="ph ph-clock-counter-clockwise"></i> Lịch sử
            </a>
        </header>

        <!-- Lọc theo loại (UI only, logic trong JS) -->
        <div class="flex gap-2 mb-6 flex-wrap">
            <span class="px-3 py-1.5 bg-rose-100 text-rose-700 text-xs font-semibold rounded-full flex items-center gap-1.5">
                <i class="ph ph-warning-circle"></i> Quá hạn
            </span>
            <span class="px-3 py-1.5 bg-amber-100 text-amber-700 text-xs font-semibold rounded-full flex items-center gap-1.5">
                <i class="ph ph-clock-countdown"></i> Sắp hạn
            </span>
            <span class="px-3 py-1.5 bg-violet-100 text-violet-700 text-xs font-semibold rounded-full flex items-center gap-1.5">
                <i class="ph ph-hourglass"></i> Chờ duyệt
            </span>
            <span class="px-3 py-1.5 bg-blue-100 text-blue-700 text-xs font-semibold rounded-full flex items-center gap-1.5">
                <i class="ph ph-book-open"></i> Đang mượn
            </span>
            <span class="px-3 py-1.5 bg-emerald-100 text-emerald-700 text-xs font-semibold rounded-full flex items-center gap-1.5">
                <i class="ph ph-check-circle"></i> Đã trả
            </span>
        </div>

        <!-- Danh sách thông báo (JS inject vào đây) -->
        <div id="notificationList" class="space-y-4">
            <!-- skeleton initial -->
            <div class="bg-white border border-slate-100 rounded-2xl p-5 animate-pulse">
                <div class="flex items-start gap-4">
                    <div class="w-11 h-11 rounded-full bg-slate-200 shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-4 bg-slate-200 rounded w-1/3"></div>
                        <div class="h-3 bg-slate-100 rounded w-3/4"></div>
                        <div class="h-3 bg-slate-100 rounded w-1/2"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../assets/js/auth.js"></script>
    <script type="module" src="../assets/js/notifications.js"></script>
</body>
</html>
