<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Báo - LibSpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">
    <nav id="site-navbar" class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="text-xl font-bold text-slate-800">Lib<span class="text-primary-600">Space</span></a>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-slate-500 hover:text-slate-900 font-medium">Trang chủ</a>
                    <a href="catalog.html" class="text-slate-500 hover:text-slate-900 font-medium">Kho học liệu</a>
                    <a href="borrow-history.html" class="text-slate-500 hover:text-slate-900 font-medium">Mượn/Trả</a>
                    <a href="notifications.html" class="text-primary-600 font-medium border-b-2 border-primary-600">Thông báo</a>
                </div>
                <div class="flex items-center gap-4">
                    <button data-favorite-trigger type="button" class="relative text-slate-500 hover:text-rose-500 p-2" title="Sách yêu thích">
                        <i class="ph ph-heart text-2xl"></i>
                        <span data-favorite-count class="absolute top-0 right-0 w-4 h-4 bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white">0</span>
                    </button>
                    <a href="cart.html" class="relative text-slate-500 hover:text-primary-600 p-2" title="Giỏ mượn">
                        <i class="ph ph-books text-2xl"></i>
                        <span data-cart-count class="absolute top-0 right-0 min-w-[16px] h-4 px-1 bg-primary-600 text-white text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white">0</span>
                    </a>
                    <div class="hidden sm:flex items-center gap-3" data-auth-slot></div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 flex-1">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900">Thông báo</h1>
            <p class="text-slate-500 mt-2">Các cập nhật về mượn trả sách sẽ hiển thị tại đây.</p>
        </header>

        <section class="space-y-4">
            <article class="bg-white border border-slate-200 rounded-2xl p-5">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-full bg-primary-50 text-primary-600 flex items-center justify-center">
                        <i class="ph ph-bell-ringing text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold text-slate-800">Chưa có thông báo mới</p>
                        <p class="text-sm text-slate-500 mt-1">Khi có phiếu mượn được duyệt, nhắc hạn trả hoặc thay đổi trạng thái, bạn sẽ thấy tại trang này.</p>
                    </div>
                </div>
            </article>
        </section>

        <a href="borrow-history.html" class="inline-flex items-center gap-2 mt-6 px-4 py-2.5 rounded-xl bg-primary-600 text-white font-semibold hover:bg-primary-700 transition-colors">
            <i class="ph ph-clock-counter-clockwise"></i>
            Quay lại quản lý mượn trả
        </a>
    </main>

    <script type="module" src="../assets/js/auth.js"></script>
</body>
</html>
