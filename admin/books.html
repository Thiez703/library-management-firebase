<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Thư Viện</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="https://unpkg.com/@hotwired/turbo@8.0.5/dist/turbo.es2017-esm.js"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' } } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-hidden">
    <div class="flex h-screen w-full">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0">
            <div class="h-16 flex items-center px-6 border-b border-slate-800">
                <i class="ph-fill ph-books text-primary-500 text-3xl mr-3"></i>
                <h1 class="text-white font-bold text-xl tracking-tight">Lib<span class="text-primary-500">Admin</span></h1>
            </div>
            <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
                <p class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Quản lý chung</p>
                <a href="admin.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 group transition-all">
                    <i class="ph ph-squares-four text-xl mr-3 group-hover:text-primary-400"></i> Bảng điều khiển
                </a>
                <a href="books.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg bg-primary-600 text-white shadow-md shadow-primary-500/20 group transition-all">
                    <i class="ph ph-book-open text-xl mr-3"></i> Quản lý Sách
                </a>
                <a href="categories.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 group transition-all">
                    <i class="ph ph-bookmarks text-xl mr-3 group-hover:text-primary-400"></i> Quản lý Thể loại
                </a>
                <a href="readers.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 group transition-all">
                    <i class="ph ph-users text-xl mr-3 group-hover:text-primary-400"></i> Quản lý Độc giả
                </a>
                <a href="loans.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 group transition-all">
                    <i class="ph ph-arrows-left-right text-xl mr-3 group-hover:text-primary-400"></i> Mượn/Trả
                </a>
                <p class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-8 mb-2">Thoát</p>
                <a href="../user/index.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 group transition-all">
                    <i class="ph ph-house text-xl mr-3 text-emerald-400 group-hover:text-emerald-300"></i> Trang Người dùng
                </a>
            </div>
            <div class="p-4 border-t border-slate-800">
                <div class="flex items-center gap-3">
                    <img id="adminAvatar" src="https://ui-avatars.com/api/?name=Admin&background=random" alt="Admin"
                        class="w-10 h-10 rounded-full border-2 border-slate-700 object-cover">
                    <div class="flex-1 min-w-0">
                        <p id="adminName" class="text-sm font-medium text-white truncate">Admin</p>
                        <p class="text-xs text-slate-400 truncate">Quản trị viên</p>
                    </div>
                    <button id="adminLogoutBtn" class="text-slate-400 hover:text-white p-1 transition-colors" title="Đăng xuất">
                        <i class="ph ph-sign-out text-lg"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-10">
                <div class="flex-1 max-w-md">
                    <input type="text" id="adminBookSearchInput" class="block w-full px-4 py-2 border border-slate-200 rounded-lg text-sm bg-slate-50 focus:outline-none focus:bg-white focus:ring-2 focus:ring-primary-500/20" placeholder="Tìm kiếm nhanh...">
                </div>
                <div class="flex items-center gap-4">
                    <img src="../assets/images/admin_avatar.png" alt="Avatar" class="w-8 h-8 rounded-full border border-slate-200" onerror="this.src='https://i.pravatar.cc/150?img=11'">
                </div>
            </header>

            <div id="main-content" class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50/50 p-6 relative animate-fade-in">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                    <div>
                        <h2 class="text-xl font-bold text-slate-800">Quản lý Kho Sách</h2>
                        <p class="text-xs text-slate-500 mt-0.5">Tổng: <strong id="total-summary">...</strong> cuốn</p>
                    </div>
                    <button onclick="document.getElementById('addBookModal').classList.replace('hidden', 'flex')" class="flex items-center gap-2 px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold rounded-lg shadow-md transition-all active:scale-95">
                        <i class="ph-bold ph-plus text-lg"></i> Thêm Sách Mới
                    </button>
                </div>

                <!-- Table -->
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left whitespace-nowrap">
                            <thead class="bg-slate-50 border-b border-slate-200 text-slate-600 text-xs uppercase font-semibold tracking-wider">
                                <tr>
                                    <th class="px-3 py-2">Bìa</th>
                                    <th class="px-3 py-2">Tên Sách</th>
                                    <th class="px-3 py-2">Tác Giả</th>
                                    <th class="px-3 py-2">Nhà Xuất Bản</th>
                                    <th class="px-3 py-2">Thể Loại</th>
                                    <th class="px-3 py-2 text-center">Số Lượng</th>
                                    <th class="px-3 py-2 text-center">Còn Lại</th>
                                    <th class="px-3 py-2">Trạng Thái</th>
                                    <th class="px-1.5 py-2 text-right">Thao Tác</th>
                                </tr>
                            </thead>
                            <tbody id="books-table-body" class="divide-y divide-slate-100 text-sm">
                                <!-- JS render -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Footer -->
                    <div class="px-4 py-3 border-t border-slate-200 flex items-center justify-between bg-slate-50/50 text-xs">
                        <div id="pagination-info" class="text-slate-600 font-medium">Đang tải...</div>
                        <div id="pagination-controls" class="flex items-center gap-1 hidden">
                            <!-- Nút phân trang thật sẽ được JS thêm vào nếu cần -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modal -->
            <div id="addBookModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[95vh] overflow-y-auto animate-fade-in">
                    <div class="sticky top-0 px-6 py-5 border-b border-slate-200 flex items-center justify-between bg-white rounded-t-2xl z-10">
                        <h3 id="modalTitle" class="text-xl font-bold text-slate-800">Thêm Sách Mới</h3>
                        <button type="button" onclick="document.getElementById('addBookModal').classList.replace('flex', 'hidden')" class="p-1.5 text-slate-400 hover:text-slate-600 rounded-lg"><i class="ph ph-x text-2xl"></i></button>
                    </div>
                    <form id="bookForm" class="p-6 space-y-6">
                        <input type="hidden" id="book-id">
                        <input type="hidden" id="old-category-id">
                        <input type="hidden" id="old-total-quantity">
                        <input type="hidden" id="old-available-quantity">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div class="sm:col-span-2">
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Tên Sách <span class="text-rose-500">*</span></label>
                                <input type="text" id="book-title" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm">
                            </div>
                            <input type="text" id="book-author" placeholder="Tác giả" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm">
                            <input type="text" id="book-publisher" placeholder="Nhà xuất bản" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm">
                            <select id="book-category" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm bg-white"></select>
                            <input type="number" id="book-year" placeholder="Năm xuất bản" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm">
                            <input type="number" id="book-quantity" placeholder="Số lượng" min="1" max="3000" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm">
                            <input type="number" id="book-duration" placeholder="Hạn mượn (ngày)" value="14" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm">
                        </div>
                        <div class="border-t pt-6">
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Ảnh bìa</label>
                            <input type="file" id="bookImage" accept="image/*" class="w-full text-sm text-slate-500">
                        </div>
                        <textarea id="book-description" rows="3" placeholder="Mô tả..." class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-sm"></textarea>
                    </form>
                    <div class="sticky bottom-0 px-6 py-4 border-t border-slate-200 bg-slate-50 flex items-center justify-end gap-3 rounded-b-2xl">
                        <button type="button" onclick="document.getElementById('addBookModal').classList.replace('flex', 'hidden')" class="px-5 py-2.5 text-sm font-semibold bg-white border border-slate-200 rounded-lg hover:bg-slate-50">Huỷ</button>
                        <button type="submit" form="bookForm" class="px-5 py-2.5 text-sm font-semibold text-white bg-primary-600 rounded-lg hover:bg-primary-700 shadow-md">Lưu Sách</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3"></div>
    <!-- Script với track reload -->
    <script type="module" src="../assets/js/books.js" data-turbo-track="reload"></script>
</body>
</html>
