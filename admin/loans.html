<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibSpace Admin - Quản lý Mượn/Trả</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="https://unpkg.com/@hotwired/turbo@8.0.5/dist/turbo.es2017-esm.js"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' } } } } }
    </script>
    <style>
        .tab-active { @apply border-b-2 border-primary-600 text-primary-600; }
        .tab-inactive { @apply text-slate-600 hover:text-primary-600; }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div class="flex h-screen">
        <!-- Sidebar (same as books page) -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0">
            <div class="h-16 flex items-center px-6 border-b border-slate-800">
                <i class="ph-fill ph-books text-primary-500 text-3xl mr-3"></i>
                <h1 class="text-white font-bold text-xl tracking-tight">Lib<span class="text-primary-500">Admin</span></h1>
            </div>
            <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
                <p class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Quản lý chung</p>
                <a href="admin.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 group transition-all">
                    <i class="ph ph-squares-four text-xl mr-3 group-hover:text-primary-400"></i> Bảng điều khiển
                </a>
                <a href="books.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 group transition-all">
                    <i class="ph ph-book-open text-xl mr-3"></i> Sách & Thể loại
                </a>
                <a href="readers.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 group transition-all">
                    <i class="ph ph-users text-xl mr-3 group-hover:text-primary-400"></i> Quản lý Độc giả
                </a>
                <a href="loans.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg bg-primary-600 text-white shadow-md shadow-primary-500/20 group transition-all">
                    <i class="ph ph-arrows-left-right text-xl mr-3"></i> Mượn/Trả
                </a>
                <a href="fines.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800"><i class="ph ph-receipt text-xl mr-3"></i>Quản lý Phạt</a>
                <a href="finance.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800"><i class="ph ph-currency-circle-dollar text-xl mr-3"></i>Tài chính & Biểu phí</a>
                <p class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-8 mb-2">Hệ thống</p>
                <a href="reports.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800"><i class="ph ph-chart-bar text-xl mr-3"></i>Báo cáo</a>
                <a href="settings.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800"><i class="ph ph-gear text-xl mr-3"></i>Cài đặt</a>
                <p class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-8 mb-2">Thoát</p>
                <a href="../user/index.html" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 group transition-all">
                    <i class="ph ph-house text-xl mr-3 text-emerald-400 group-hover:text-emerald-300"></i> Trang Người dùng
                </a>
            </div>
            <div class="p-4 border-t border-slate-800">
                <div class="flex items-center gap-3">
                    <img id="adminAvatar" src="https://ui-avatars.com/api/?name=Admin&background=random" alt="Admin"
                        class="w-10 h-10 rounded-full border-2 border-slate-700 object-cover">
                    <div class="flex-1 min-w-0">
                        <p id="adminName" class="text-sm font-medium text-white truncate">Admin</p>
                        <p class="text-xs text-slate-400 truncate">Quản trị viên</p>
                    </div>
                    <button id="adminLogoutBtn" class="text-slate-400 hover:text-white p-1 transition-colors" title="Đăng xuất">
                        <i class="ph ph-sign-out text-lg"></i>
                    </button>
                </div>
            </div>
        </aside>

        <script type="module">
            import { checkAuthState, signOutUser } from '../assets/js/auth.js';
            checkAuthState((user, userData) => {
                if (!user || userData?.role !== 'admin') {
                    window.location.href = '../user/login.html';
                    return;
                }
                const adminName = document.getElementById('adminName');
                const adminAvatar = document.getElementById('adminAvatar');
                if (adminName) adminName.innerText = userData.displayName || user.email;
                if (adminAvatar) adminAvatar.src = userData.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.displayName || user.email)}&background=random`;
            });
            document.getElementById('adminLogoutBtn')?.addEventListener('click', (e) => {
                e.preventDefault();
                signOutUser();
            });
        </script>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
                <h2 class="text-base font-bold text-slate-800">Quản lý Mượn/Trả</h2>
            </header>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <!-- Stat Cards -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-center">
                        <div class="p-3 bg-amber-100 rounded-full text-amber-600 mr-4">
                            <i class="ph ph-hourglass-high text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-sm text-slate-500">Chờ duyệt</p>
                            <p id="stat-pending" class="text-xl font-bold text-amber-600">0</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-center">
                        <div class="p-3 bg-blue-100 rounded-full text-blue-600 mr-4">
                            <i class="ph ph-book-open text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-sm text-slate-500">Đang mượn</p>
                            <p id="stat-borrowing" class="text-xl font-bold text-blue-600">0</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-center">
                        <div class="p-3 bg-rose-100 rounded-full text-rose-600 mr-4">
                            <i class="ph ph-warning-circle text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-sm text-slate-500">Quá hạn</p>
                            <p id="stat-overdue" class="text-xl font-bold text-rose-600">0</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-center">
                        <div class="p-3 bg-emerald-100 rounded-full text-emerald-600 mr-4">
                            <i class="ph ph-calendar-check text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-sm text-slate-500">Trả hôm nay</p>
                            <p id="stat-due-today" class="text-xl font-bold text-emerald-600">0</p>
                        </div>
                    </div>
                </div>

                <!-- Tab Bar -->
                <div class="border-b border-slate-200">
                    <nav class="flex space-x-4" id="loan-tabs">
                        <button data-tab="pending" class="tab-active py-2 px-4">Chờ duyệt</button>
                        <button data-tab="borrowing" class="tab-inactive py-2 px-4">Đang mượn</button>
                        <button data-tab="overdue" class="tab-inactive py-2 px-4">Quá hạn</button>
                        <button data-tab="completed" class="tab-inactive py-2 px-4">Hoàn thành</button>
                    </nav>
                </div>

                <!-- Search Bar -->
                <div class="flex items-center gap-3 mt-4">
                    <div class="relative flex-1 max-w-md">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="loan-search" placeholder="Tìm phiếu (Mã, SĐT, CCCD, Tên)"
                            class="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary-500/20">
                    </div>
                </div>

                <!-- Table Container -->
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left whitespace-nowrap">
                            <thead class="bg-slate-50 border-b border-slate-200 text-slate-600 text-xs uppercase font-semibold tracking-wider">
                                <tr id="table-header-row">
                                    <!-- Filled by JS -->
                                </tr>
                            </thead>
                            <tbody id="loan-table-body" class="divide-y divide-slate-100 text-sm">
                                <!-- Rows rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../assets/js/admin-loans.js" data-turbo-track="reload"></script>
</body>
</html>
